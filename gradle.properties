
# Настройки памяти для ускорения сборки
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Включаем поддержку современных библиотек AndroidX (ОБЯЗАТЕЛЬНО для Jetpack Compose)
android.useAndroidX=true

# Автоматическая миграция старых библиотек на AndroidX (для совместимости)
android.enableJetifier=true

